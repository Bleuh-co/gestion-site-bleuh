# Build + dรฉploiement Gestion Site Bleuh โ€” modรจle Gandalf (contrat SDK).
# Build + Artifact Registry en northamerica-northeast1 ; dรฉploiement Cloud Run
# en us-east1. Install du SDK privรฉ @bleuh-co via secret BuildKit (jamais gravรฉ).
#
# Les substitutions par dรฉfaut = PROD (antigravity). Le trigger Cloud Build
# crรฉรฉ par le gรฉnรฉrateur les surcharge par environnement (dev/prod).

substitutions:
  _SERVICE: gestion-site-bleuh
  _DEPLOY_REGION: us-east1
  _AR_HOSTNAME: northamerica-northeast1-docker.pkg.dev
  _AR_REPOSITORY: cloud-run-source-deploy
  _TAG: latest
  _FB_API_KEY: AIzaSyBj17yDs3xOQq8lFYjOfx3TmKTeIPANNXs
  _FB_AUTH_DOMAIN: antigravity-20260107.firebaseapp.com
  _FB_PROJECT_ID: antigravity-20260107
  _FB_STORAGE_BUCKET: antigravity-20260107.firebasestorage.app
  _FB_SENDER_ID: "271227085398"
  _FB_APP_ID: 1:271227085398:web:dd67b650261fbb28d551f7
  _ALLOWED_DOMAINS: chanv.com,bleuh.co,lafeuilleverte.ca,maisondherbes.com
  _HUB_URL: https://gandalf.chanv.com

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    secretEnv: ["GH_PKG_TOKEN"]
    args:
      - -c
      - |
        set -euo pipefail
        trap 'rm -f /workspace/gh_token' EXIT
        printf '%s' "$$GH_PKG_TOKEN" > /workspace/gh_token
        DOCKER_BUILDKIT=1 docker build \
          --secret id=gh_token,src=/workspace/gh_token \
          --build-arg NEXT_PUBLIC_FIREBASE_API_KEY=${_FB_API_KEY} \
          --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${_FB_AUTH_DOMAIN} \
          --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_FB_PROJECT_ID} \
          --build-arg NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${_FB_STORAGE_BUCKET} \
          --build-arg NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${_FB_SENDER_ID} \
          --build-arg NEXT_PUBLIC_FIREBASE_APP_ID=${_FB_APP_ID} \
          --build-arg NEXT_PUBLIC_ALLOWED_EMAIL_DOMAINS=${_ALLOWED_DOMAINS} \
          --build-arg NEXT_PUBLIC_HUB_URL=${_HUB_URL} \
          -t "${_AR_HOSTNAME}/${_FB_PROJECT_ID}/${_AR_REPOSITORY}/${_SERVICE}:${_TAG}" .
        rm -f /workspace/gh_token

  - id: push
    name: gcr.io/cloud-builders/docker
    args: ["push", "${_AR_HOSTNAME}/${_FB_PROJECT_ID}/${_AR_REPOSITORY}/${_SERVICE}:${_TAG}"]

  # `gcloud run deploy` sans --set-env-vars/--set-secrets prรฉserve les env vars
  # et secrets dรฉjร  montรฉs sur le service (crรฉรฉ par le gรฉnรฉrateur).
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_AR_HOSTNAME}/${_FB_PROJECT_ID}/${_AR_REPOSITORY}/${_SERVICE}:${_TAG}
      - --project=${_FB_PROJECT_ID}
      - --region=${_DEPLOY_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=1Gi
      - --cpu=1

images:
  - "${_AR_HOSTNAME}/${_FB_PROJECT_ID}/${_AR_REPOSITORY}/${_SERVICE}:${_TAG}"

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/GITHUB_PACKAGES_TOKEN/versions/latest
      env: GH_PKG_TOKEN

options:
  machineType: "E2_HIGHCPU_8"
  logging: CLOUD_LOGGING_ONLY
